<!-- ===== Section: Product Filter ===== -->
<section class="product-filter-section">
  <div class="product-filter-container">
    <form id="product-filter-form" action="#" class="product-filter-form">
      <div class="product-filter-header">
        <h2 class="product-filter-heading">Filters</h2>
        <button type="button" class="btn-product-filter-close" aria-label="Close Product Filter">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </div>
      <div class="product-filter-body">
          <div class="product-filter-group">
            <div class="form-checkbox">
              <input type="checkbox" id="in-stock" name="in-stock" class="checkbox-input" />
              <label for="in-stock" class="checkbox-label">In stock only</label>
            </div>
          </div>
          <div class="product-filter-group">
            <h3 class="product-filter-group-title">Price</h3>
            <div class="price-range-group">
              <div class="price-input-group">
                <label for="min-price" class="price-label">From</label>
                <div class="price-input-wrapper">
                  <span class="price-currency">PKR</span>
                  <input type="number" id="min-price" name="min-price" class="price-input" min="0" aria-label="Minimum Price" />
                </div>
              </div>
              <div class="price-input-group">
                <label for="max-price" class="price-label">To</label>
                <div class="price-input-wrapper">
                  <span class="price-currency">PKR</span>
                  <input type="number" id="max-price" name="max-price" class="price-input" min="0" aria-label="Maximum Price" />
                </div>
              </div>
            </div>
          </div>
          <div class="product-filter-group">
            <h3 class="product-filter-group-title">Categories</h3>
            <div class="form-checkbox">
              <input type="checkbox" id="cat-earpods" name="category" class="checkbox-input" />
              <label for="cat-earpods" class="checkbox-label">EarPods</label>
            </div>
            <div class="form-checkbox">
              <input type="checkbox" id="cat-neckband-wireless" name="category" class="checkbox-input" />
              <label for="cat-neckband-wireless" class="checkbox-label">Neckband</label>
            </div>
            <div class="form-checkbox">
              <input type="checkbox" id="cat-in-ear-earphones" name="category" class="checkbox-input" />
              <label for="cat-in-ear-earphones" class="checkbox-label">Earphones</label>
            </div>
            <div class="form-checkbox">
              <input type="checkbox" id="cat-headphones" name="category" class="checkbox-input" />
              <label for="cat-headphones" class="checkbox-label">Headphones</label>
            </div>
          </div>
      </div>
      <div class="product-filter-footer">
        <button type="reset" class="btn-product-filter-clear">Clear</button>
        <button type="submit" class="btn-product-filter-apply btn btn-secondary">
          Apply
        </button>
      </div>
    </form>
  </div>
</section>
